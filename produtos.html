<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Grade de Produtos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.15s;
    }
    .card:hover {
      transform: translateY(-6px) scale(1.025);
      box-shadow: 0 6px 24px rgba(0,0,0,0.09);
    }
    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }
    .card-content {
      padding: 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }
    .card-title {
      font-size: 1.15rem;
      font-weight: bold;
      margin: 0 0 8px 0;
    }
    .card-desc {
      color: #444;
      font-size: 1rem;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="product-grid">
    <div class="card">
      <img src="https://source.unsplash.com/400x300/?shoes" alt="Tênis Esportivo">
      <div class="card-content">
        <div class="card-title">Tênis Esportivo</div>
        <div class="card-desc">Conforto e estilo para os seus treinos diários.</div>
      </div>
    </div>
    <div class="card">
      <img src="https://source.unsplash.com/400x300/?headphones" alt="Fones de Ouvido">
      <div class="card-content">
        <div class="card-title">Fones de Ouvido</div>
        <div class="card-desc">Qualidade de som incomparável e tecnologia sem fio.</div>
      </div>
    </div>
    <div class="card">
      <img src="https://source.unsplash.com/400x300/?watch" alt="Relógio Inteligente">
      <div class="card-content">
        <div class="card-title">Relógio Inteligente</div>
        <div class="card-desc">Monitore sua saúde, notificações e muito mais.</div>
      </div>
    </div>
    <div class="card">
      <img src="https://source.unsplash.com/400x300/?backpack" alt="Mochila Executiva">
      <div class="card-content">
        <div class="card-title">Mochila Executiva</div>
        <div class="card-desc">Design moderno e espaço para todos os seus itens.</div>
      </div>
    </div>
    <!-- Adicione mais cards conforme necessário -->
  </div>
</body>
</html>
